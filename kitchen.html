<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kitchen Screen</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

.order{
  background:#222;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.pending{border-left:8px solid yellow;}
.preparing{border-left:8px solid blue;}
.done{border-left:8px solid green;}

select{
  font-size:16px;
  padding:5px;
}
</style>
</head>

<body>

<h1>🍜 Kitchen Orders</h1>

<div id="orders"></div>

<script>

const SHEET_API =
"https://script.google.com/macros/s/AKfycby4sjmDaJfAZu0h7PwZsG9B6-0qtXG2dXMy0c7ZPl3VGBpHU9cTdVZGgEgFQO65OVho/exec";

function loadOrders(){

fetch(SHEET_API + "?t=" + new Date().getTime())
.then(res=>res.text())
.then(text=>{

let data = JSON.parse(text);

let container=document.getElementById("orders");
container.innerHTML="";

data.reverse().forEach(order=>{

let div=document.createElement("div");

let statusClass = order.status.toLowerCase();

div.className="order "+statusClass;

div.innerHTML=`
<h3>Table ${order.table}</h3>
<p>${order.items}</p>
<b>RM ${order.total}</b><br><br>

<button onclick="printOrder(this)">🖨️ Print</button><br><br>

<select onchange="updateStatus('${order.id}',this.value)">
<option ${order.status=="Pending"?"selected":""}>Pending</option>
<option ${order.status=="Preparing"?"selected":""}>Preparing</option>
<option ${order.status=="Done"?"selected":""}>Done</option>
<option ${order.status=="Cancel"?"selected":""}>Cancel</option>
</select>
`;

container.appendChild(div);

});

})
.catch(err=>console.log(err));

} // ✅ CLOSE loadOrders



function updateStatus(id,status){

fetch(SHEET_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"updateStatus",
id:id,
status:status
})
});

} // ✅ CLOSE updateStatus



function printOrder(btn){

let orderCard = btn.closest(".order");

let table = orderCard.querySelector("h3")?.innerText || "";
let items = orderCard.querySelector("p")?.innerText || "";
let total = orderCard.querySelector("b")?.innerText || "";

let printWindow = window.open("", "", "width=300,height=600");

printWindow.document.write(`
<html>
<head>
<title>Kitchen Ticket</title>
<style>
body{
font-family: monospace;
width:80mm;
font-size:14px;
margin:0;
padding:5px;
}
hr{border-top:1px dashed black;}
</style>
</head>
<body onload="window.print();window.close();">
<center><b>KITCHEN ORDER</b></center>
<hr>
<h3>${table}</h3>
<p>${items}</p>
<b>${total}</b>
<hr>
</body>
</html>
`);

printWindow.document.close();

}



loadOrders();
setInterval(loadOrders,5000);

</script>
